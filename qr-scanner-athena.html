<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>QR Scanner with Fireworks Effect</title>\n    <style>\n        body {\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n            background-color: #282c34;\n            color: white;\n            overflow: hidden;\n        }\n        canvas {\n            position: absolute;\n            top: 0;\n            left: 0;\n            z-index: -1;\n        }\n        img {\n            width: 200px;\n            height: 200px;\n            position: relative;\n            z-index: 1;\n        }\n        .particle {\n            position: fixed;\n            pointer-events: none;\n        }\n        input[type=\"file\"] {\n            z-index: 1;\n        }\n    </style>\n</head>\n<body>\n    <input type=\"file\" id=\"upload\" accept=\"image/*\">\n    <img id=\"athenaImage\" src=\"https://example.com/athena.png\" alt=\"Athena\">\n    <canvas id=\"fireworksCanvas\"></canvas>\n    <script src=\"https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.js\"></script>\n    <script>\n        const uploadInput = document.getElementById('upload');\n        const athenaImage = document.getElementById('athenaImage');\n        uploadInput.addEventListener('change', function(e) {\n            const file = e.target.files[0];\n            if (file) {\n                const reader = new FileReader();\n                reader.onload = function(event) {\n                    athenaImage.src = event.target.result;\n                };\n                reader.readAsDataURL(file);\n            }\n        });\n        function createFireworks() {\n            const canvas = document.getElementById('fireworksCanvas');\n            const ctx = canvas.getContext('2d');\n            canvas.width = window.innerWidth;\n            canvas.height = window.innerHeight;\n            // Fireworks effect code here \n        }\n        createFireworks();\n        // Particle effects for strawberries\n        function create3DParticles() {\n            const particles = [];\n            for (let i = 0; i < 100; i++) {\n                const particle = document.createElement('div');\n                particle.className = 'particle';\n                particle.innerHTML = '🍓';\n                document.body.appendChild(particle);\n                particles.push(particle);\n            }\n            // Animate particles\n        }\n        create3DParticles();\n        // Add QR code scanning functionality\n    </script>\n</body>\n</html>\n
